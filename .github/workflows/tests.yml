name: Tests et Couverture

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  test:
    name: Tests Python 3.10
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio pytest-mock

      - name: Create test .env
        run: |
          cat > .env << EOF
          # Test environment
          DB_HOST=localhost
          DB_PORT=5432
          DB_NAME=test_db
          DB_USER=test_user
          DB_PASSWORD=test_password

          ANTHROPIC_API_KEY=sk-ant-test-placeholder
          SHOPIFY_STORE=test-store.myshopify.com
          SHOPIFY_CLIENT_ID=test_client_id
          SHOPIFY_CLIENT_SECRET=test_client_secret

          GMAIL_USER=test@example.com
          GMAIL_APP_PASSWORD=test_password

          DASHBOARD_USERNAME=admin
          DASHBOARD_PASSWORD=admin

          SENTRY_DSN=https://placeholder@sentry.io/placeholder
          SENTRY_ENVIRONMENT=test
          EOF

      - name: Run tests with coverage
        run: |
          pytest tests/unit/ -v --cov=core --cov=storage --cov=connectors \
            --cov-report=xml --cov-report=term-missing \
            --cov-report=html --cov-config=.coveragerc
        env:
          PYTHONPATH: .

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests
          name: codecov-oktagon-sav
          fail_ci_if_error: false

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 30

      - name: Comment PR with coverage
        if: github.event_name == 'pull_request'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}

  lint:
    name: Linting et Style
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install linting tools
        run: |
          pip install flake8 black isort mypy

      - name: Check code formatting (black)
        run: |
          black --check --diff core/ storage/ connectors/ handlers/ domain/ workers/ || true

      - name: Check import sorting (isort)
        run: |
          isort --check-only --diff core/ storage/ connectors/ handlers/ domain/ workers/ || true

      - name: Lint with flake8
        run: |
          # Stop build if critical errors (E9, F63, F7, F82)
          flake8 core/ storage/ connectors/ handlers/ domain/ workers/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warnings only for other issues
          flake8 core/ storage/ connectors/ handlers/ domain/ workers/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install security tools
        run: |
          pip install bandit safety

      - name: Run Bandit security scan
        run: |
          bandit -r core/ storage/ connectors/ handlers/ domain/ workers/ -f json -o bandit-report.json || true
          bandit -r core/ storage/ connectors/ handlers/ domain/ workers/ || true

      - name: Check dependencies for vulnerabilities
        run: |
          safety check --json || true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: bandit-report.json
          retention-days: 30
